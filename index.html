<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BNT Hidden Prompt Copier</title>

<style>
body{
  background:#0b0b10;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
  color:#fff;
}

.card{
  width:360px;
  padding:20px;
  border-radius:18px;
  background:linear-gradient(145deg,#1a1a1a,#0f0f0f);
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
  text-align:center;
}

.title{
  font-size:18px;
  font-weight:bold;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#00c853;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#00e676;
}

.toast{
  margin-top:10px;
  font-size:12px;
  color:#00e676;
  opacity:0;
  transition:0.3s;
}

.toast.show{
  opacity:1;
}
</style>
</head>

<body>

<div class="card">

  <div class="title" id="title">BNT Card</div>

  <button onclick="copyPrompt()">COPY PROMPT</button>

  <div id="toast" class="toast">COPIED ✔</div>

</div>

<script>

// ===== JSONデータ（裏で保持）=====
const data = {
  cards: [
    {
      id: "BNT-001",
      title: "Core Desire Engine",
      prompt: "BNT=EmotionalArchitectureEngine;TYPE=AttractionModel;TRAIT=Strong×Silent×ControlledHeat;GOAL=UnforgettablePresence;OUTPUT=ViralPsychologicalHook;"
    }
  ]
};

// 表示は最小限
document.getElementById("title").innerText =
  data.cards[0].id + " / " + data.cards[0].title;

// コピー本体
function copyPrompt(){
  const text = data.cards[0].prompt;
  const toast = document.getElementById("toast");

  navigator.clipboard.writeText(text).then(()=>{

    toast.classList.add("show");

    setTimeout(()=>{
      toast.classList.remove("show");
    },1200);

  });
}

</script>

</body>
</html>
