<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BNT JSON Card</title>

<style>
body{
  background:#0b0b10;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
  color:#fff;
}

.card{
  width:420px;
  border-radius:18px;
  padding:20px;
  background:linear-gradient(145deg,#1a1a1a,#0f0f0f);
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.title{
  font-size:18px;
  font-weight:bold;
  margin-bottom:6px;
}

.meta{
  font-size:11px;
  opacity:0.7;
  margin-bottom:12px;
  color:#00e676;
}

.prompt{
  background:rgba(0,0,0,0.4);
  padding:12px;
  border-radius:10px;
  font-size:12px;
  white-space:pre-wrap;
  border:1px solid rgba(255,255,255,0.08);
}

button{
  margin-top:12px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00c853;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#00e676;
}

.toast{
  margin-top:8px;
  font-size:12px;
  color:#00e676;
  opacity:0;
  transition:0.3s;
}

.toast.show{
  opacity:1;
}
</style>
</head>

<body>

<div class="card">

  <div class="title" id="title">Loading...</div>
  <div class="meta" id="meta"></div>

  <div class="prompt" id="prompt">Loading prompt...</div>

  <button onclick="copyPrompt()">COPY PROMPT</button>

  <div id="toast" class="toast">COPIED ✔</div>

</div>

<script>

let currentText = "";

// ===== JSON読み込み（ここが本体）=====
fetch("prompt.json")
  .then(res => res.json())
  .then(data => {

    const card = data.cards[0];

    document.getElementById("title").innerText =
      card.id + " / " + card.title;

    document.getElementById("meta").innerText =
      "VERSION: " + card.version;

    document.getElementById("prompt").innerText =
      card.prompt;

    currentText = card.prompt;
  });

// ===== コピー =====
function copyPrompt(){
  const toast = document.getElementById("toast");

  navigator.clipboard.writeText(currentText).then(()=>{

    toast.classList.add("show");

    setTimeout(()=>{
      toast.classList.remove("show");
    },1200);

  });
}

</script>

</body>
</html>
