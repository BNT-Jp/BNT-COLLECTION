<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BNT JSON Card Loader</title>

<style>
body{
  background:#0b0b10;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  font-family:sans-serif;
  color:#fff;
}

.card{
  width:420px;
  border-radius:18px;
  padding:20px;
  background:linear-gradient(145deg,#1a1a1a,#0f0f0f);
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
  position:relative;
  overflow:hidden;
}

/* 光の演出 */
.card::before{
  content:"";
  position:absolute;
  top:-60%;
  left:-60%;
  width:220%;
  height:220%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.08),transparent);
  transform:rotate(25deg);
  animation:shine 6s infinite linear;
}

@keyframes shine{
  0%{transform:translateX(-100%) rotate(25deg);}
  100%{transform:translateX(100%) rotate(25deg);}
}

.title{
  font-size:18px;
  font-weight:bold;
  margin-bottom:6px;
}

.meta{
  font-size:11px;
  opacity:0.7;
  margin-bottom:12px;
  color:#00e676;
}

.prompt{
  background:rgba(0,0,0,0.4);
  padding:12px;
  border-radius:10px;
  font-size:12px;
  white-space:pre-wrap;
  border:1px solid rgba(255,255,255,0.08);
  max-height:300px;
  overflow:auto;
}

button{
  margin-top:12px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00c853;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#00e676;
}

.toast{
  margin-top:8px;
  font-size:12px;
  color:#00e676;
  opacity:0;
  transition:0.3s;
}

.toast.show{
  opacity:1;
}
</style>
</head>

<body>

<div class="card">

  <div class="title" id="title">Loading...</div>
  <div class="meta" id="meta"></div>

  <div id="prompt" class="prompt">読み込み中...</div>

  <button onclick="copyPrompt()">COPY PROMPT</button>

  <div id="toast" class="toast">COPIED ✔</div>

</div>

<script>
// ===== JSONデータ（ここに外部化も可能）=====
const data = {
  cards: [
    {
      id: "BNT-001",
      title: "Irresistible Man Designer",
      version: "2.0",
      prompt: "BNT=GayMalePsychologyAnalyzer+IrresistibleManDesigner;\nVERSION=2.0;\nGOAL=Viral(SelfInsert+Shareable+Memorable);\n\nSTEP1{\nOBJECTIVE=Generate emotional attraction;\n}\n"
    }
  ]
};

// ===== 表示 =====
const card = data.cards[0];

document.getElementById("title").innerText =
  card.id + " / " + card.title;

document.getElementById("meta").innerText =
  "VERSION: " + card.version;

document.getElementById("prompt").innerText =
  card.prompt;

// ===== コピー =====
function copyPrompt(){
  const text = card.prompt;
  const toast = document.getElementById("toast");

  navigator.clipboard.writeText(text).then(()=>{

    toast.classList.add("show");

    setTimeout(()=>{
      toast.classList.remove("show");
    },1200);

  });
}
</script>

</body>
</html>
