<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BNT Prompt Copier</title>

<style>
body{
  background:#0b0b10;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
  color:#fff;
  margin:0;
}

.card{
  width:380px;
  padding:22px;
  border-radius:18px;
  background:linear-gradient(145deg,#1a1a1a,#0f0f0f);
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
  text-align:center;
}

.title{
  font-size:18px;
  font-weight:bold;
  margin-bottom:6px;
}

.subtitle{
  font-size:12px;
  opacity:0.6;
  margin-bottom:20px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#00c853;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  font-size:14px;
}

button:hover{
  background:#00e676;
}

button:disabled{
  background:#333;
  cursor:not-allowed;
}

.toast{
  margin-top:12px;
  font-size:12px;
  color:#00e676;
  opacity:0;
  transition:0.3s;
}

.toast.show{
  opacity:1;
}
</style>
</head>

<body>

<div class="card">

  <div class="title" id="title">Loading...</div>
  <div class="subtitle">Prompt is hidden (secure copy mode)</div>

  <button id="copyBtn" onclick="copyPrompt()" disabled>
    COPY PROMPT
  </button>

  <div id="toast" class="toast">COPIED ✔</div>

</div>

<script>

let currentPrompt = "";

// ===== JSON読み込み =====
fetch("prompt.json")
  .then(res => res.json())
  .then(data => {

    const card = data.cards[0];

    // 表示はタイトルだけ
    document.getElementById("title").innerText =
      card.id + " / " + card.title;

    // コピー用データ保存
    currentPrompt = card.prompt;

    // ボタン有効化
    document.getElementById("copyBtn").disabled = false;
  })
  .catch(err => {
    document.getElementById("title").innerText = "Load failed";
    console.error(err);
  });

// ===== コピー処理 =====
function copyPrompt(){

  if(!currentPrompt) return;

  const toast = document.getElementById("toast");

  navigator.clipboard.writeText(currentPrompt)
    .then(() => {

      toast.classList.add("show");

      setTimeout(() => {
        toast.classList.remove("show");
      }, 1200);

    });
}

</script>

</body>
</html>
